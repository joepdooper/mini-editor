name: publish

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Optional: handle scoped packages with OIDC
      - name: Configure npm for OIDC
        run: |
          echo "//registry.npmjs.org/:_authToken=\${{ steps.oidc-token.outputs.npm_token }}" > ~/.npmrc
        id: oidc-token
        run: echo "npm_token=$(npm token create --cid ${{ github.actor }})" >> $GITHUB_ENV

      # Install dependencies
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Build step
      - name: Build
        run: npm run build || echo "No build step defined"

      # Skip publish if version already exists
      - name: Check npm for existing version
        id: check_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" > /dev/null 2>&1; then
            echo "skip_publish=true" >> $GITHUB_OUTPUT
          else
            echo "skip_publish=false" >> $GITHUB_OUTPUT

      # Publish
      - name: Publish
        if: steps.check_version.outputs.skip_publish == 'false'
        run: npm publish --access public